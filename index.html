<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Tic-Tac-Toe 3D: 100 Grid Edition</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a110b;
            font-family: 'Georgia', serif;
            color: #e7dec8;
        }

        /* Vintage Overlay Efek Kertas Kuno */
        .vintage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.6) 100%);
            z-index: 999;
        }

        /* Screen Menu Utama */
        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2c1e15 0%, #120a06 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        .menu-box {
            background: #3c2a21;
            border: 4px double #d4af37;
            padding: 30px 20px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            color: #d4af37;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-style: italic;
            color: #bfa38a;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #e7dec8;
            font-weight: bold;
        }

        .vintage-input {
            width: 100%;
            background-color: #f4eedb;
            border: 2px solid #634832;
            color: #1a120b;
            padding: 10px;
            font-size: 15px;
            font-family: 'Georgia', serif;
            border-radius: 4px;
            outline: none;
        }

        .role-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .role-btn {
            background: #231510;
            border: 2px solid #634832;
            color: #bfa38a;
            padding: 8px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .role-btn.active {
            background: #d4af37;
            color: #1a120b;
            border-color: #fff;
        }

        .vintage-btn {
            width: 100%;
            background: linear-gradient(to bottom, #a05a3c 0%, #703820 100%);
            color: #fff;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Georgia', serif;
            border: 2px solid #3c2a21;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 0 #4a2211, 0 6px 10px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        /* HUD Atas Sesuai Gambar Referensi */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            z-index: 10;
            pointer-events: none;
        }

        .score-card {
            background: #36251c;
            border: 1px solid #4d3528;
            padding: 10px 15px;
            border-radius: 6px;
            width: 140px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .score-card.active-turn {
            border-color: #d4af37;
            background: #463024;
        }

        .score-card .name {
            font-size: 10px;
            color: #a49283;
            font-family: monospace;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .score-card .val {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
        }

        .vs-text {
            font-size: 14px;
            font-family: 'Georgia', serif;
            font-style: italic;
            color: #8a7667;
            font-weight: bold;
        }

        /* Status Teks Tengah Atas */
        #status-text {
            position: absolute;
            top: 105px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 4px;
            color: #a49283;
            text-align: center;
            pointer-events: none;
        }

        /* DOCK TOMBOL BAWAH Sesuai Gambar Referensi */
        #control-dock {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .row-buttons {
            display: flex;
            gap: 15px;
        }

        .dock-btn {
            background: linear-gradient(to bottom, #422d22 0%, #2b1d16 100%);
            border: 1px solid #5c4132;
            color: #bca695;
            padding: 8px 16px;
            font-size: 10px;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dock-btn.danger {
            background: linear-gradient(to bottom, #723122 0%, #4a1d13 100%);
            border: 1px solid #873f2f;
            color: #f2c4ba;
        }

        .dock-btn:active {
            transform: scale(0.96);
        }

        /* Kanvas Utama */
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Banner Pop-up Kemenangan */
        #banner-overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 50;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 90%;
        }

        #banner-overlay.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .banner-title {
            font-size: 32px;
            color: #fff;
            text-shadow: 0 0 10px #ffaa00, 2px 2px 5px #000;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div class="vintage-overlay"></div>

    <div id="menu-screen">
        <div class="menu-box">
            <h1>CENTURY GRID</h1>
            <div class="subtitle">100-Squares 3D Board</div>
            
            <div class="input-group">
                <label>Nama Pemain 1</label>
                <input type="text" id="p1-name" class="vintage-input" value="Player 1">
            </div>
            <div class="input-group">
                <label>Nama Pemain 2</label>
                <input type="text" id="p12-name" class="vintage-input" value="Player 2">
            </div>

            <div class="role-selector">
                <button type="button" id="btn-select-x" class="role-btn active" onclick="setSymbol('X')">X</button>
                <button type="button" id="btn-select-o" class="role-btn" onclick="setSymbol('O')">O</button>
            </div>

            <button type="button" class="vintage-btn" onclick="initiateGame()">Masuk Ke Papan</button>
        </div>
    </div>

    <div id="hud" style="display: none;">
        <div id="card-x" class="score-card">
            <div id="name-x" class="name">WAITING...</div>
            <div id="score-x" class="val">0</div>
        </div>
        
        <div class="vs-text">VS</div>

        <div id="card-o" class="score-card">
            <div id="name-o" class="name">WAITING...</div>
            <div id="score-o" class="val">0</div>
        </div>
    </div>

    <div id="status-text" style="display: none;">MENGHUBUNGKAN...</div>

    <div id="control-dock" style="display: none;">
        <div class="row-buttons">
            <button class="dock-btn" onclick="refreshTampilan()">🔄 Refresh Tampilan</button>
            <button class="dock-btn" onclick="resetPapan()">🧹 Reset Papan</button>
        </div>
        <button class="dock-btn danger" onclick="selesaikanPermainan()">🏁 Selesaikan Permainan</button>
    </div>

    <div id="banner-overlay">
        <div id="banner-text" class="banner-title">X MENANG!</div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        // --- DATA UTAMA PERMAINAN (MATRIKS 10X10 = 100 PETAK) ---
        const GameState = {
            players: {
                X: { name: "Player 1", score: 0 },
                O: { name: "Player 2", score: 0 }
            },
            currentPlayer: "X",
            gridSize: 10, // 10 baris dan 10 kolom
            currentGrid: Array(100).fill(null), // 100 Petak total
            isLock: false,
            p1Symbol: "X"
        };

        function setSymbol(sym) {
            GameState.p1Symbol = sym;
            document.getElementById('btn-select-x').classList.toggle('active', sym === 'X');
            document.getElementById('btn-select-o').classList.toggle('active', sym === 'O');
        }

        function initiateGame() {
            const p1 = document.getElementById('p1-name').value.trim() || "Player 1";
            const p2 = document.getElementById('p12-name').value.trim() || "Player 2";

            if (GameState.p1Symbol === 'X') {
                GameState.players.X.name = p1;
                GameState.players.O.name = p2;
            } else {
                GameState.players.X.name = p2;
                GameState.players.O.name = p1;
            }

            document.getElementById('name-x').innerText = GameState.players.X.name.toUpperCase();
            document.getElementById('name-o').innerText = GameState.players.O.name.toUpperCase();

            document.getElementById('menu-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
                document.getElementById('status-text').style.display = 'block';
                document.getElementById('control-dock').style.display = 'flex';
                build3DScene();
                updateHUD();
            }, 500);
        }

        function updateHUD() {
            document.getElementById('score-x').innerText = GameState.players.X.score;
            document.getElementById('score-o').innerText = GameState.players.O.score;
            document.getElementById('status-text').innerText = `GILIRAN: ${GameState.players[GameState.currentPlayer].name.toUpperCase()}`;
            
            document.getElementById('card-x').classList.toggle('active-turn', GameState.currentPlayer === 'X');
            document.getElementById('card-o').classList.toggle('active-turn', GameState.currentPlayer === 'O');
        }

        // --- ENGINE RENDERING 3D (THREE.JS) ---
        let scene, camera, renderer, raycaster, mouse;
        let boardGroup, cellsArray = [], piecesGroup;

        function build3DScene() {
            const canvas = document.getElementById('game-canvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a110b);

            // Pengaturan kamera perspektif miring ke depan persis seperti di gambar
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Setup Lighting hangat redup kecokelatan sesuai screenshot
            const ambientLight = new THREE.AmbientLight(0xfff0e2, 0.75);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffdfc4, 0.5);
            dirLight.position.set(5, 15, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            boardGroup = new THREE.Group();
            piecesGroup = new THREE.Group();
            boardGroup.add(piecesGroup);
            scene.add(boardGroup);

            create100GridBoard();
            adjustCamera();

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('pointerdown', onPointerDown, false);

            animate();
        }

        // --- MEMBUAT PAPAN COKELAT 100 PETAK (10x10 GRID) ---
        function create100GridBoard() {
            // Material cokelat gelap mirip gambar referensi
            const boardMat = new THREE.MeshStandardMaterial({ color: 0x2e1f16, roughness: 0.6, metalness: 0.1 });
            const cellMat = new THREE.MeshStandardMaterial({ color: 0x4a3325, roughness: 0.5 });
            const lineMat = new THREE.MeshStandardMaterial({ color: 0x22160f });

            // Ukuran Base Papan Utama dibuat pas melebar persegi panjang proporsional
            const baseMesh = new THREE.Mesh(new THREE.BoxGeometry(8.4, 0.3, 8.4), boardMat);
            baseMesh.receiveShadow = true;
            boardGroup.add(baseMesh);

            cellsArray = [];
            let idx = 0;
            const step = 0.8; // Ukuran jarak tiap petak kotak kecil
            const origin = -3.6; // Pusat awal rendering grid kiri-atas

            for (let z = 0; z < 10; z++) {
                for (let x = 0; x < 10; x++) {
                    // Membuat kotak berujung rounded tipis lewat BoxGeometry pipih
                    const cellMesh = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.08, 0.72), cellMat);
                    cellMesh.position.set(origin + (x * step), 0.16, origin + (z * step));
                    cellMesh.userData = { index: idx };
                    
                    boardGroup.add(cellMesh);
                    cellsArray.push(cellMesh);
                    idx++;
                }
            }
        }

        function adjustCamera() {
            // Pengaturan posisi pandang kamera agar pas di layar HP vertikal persis foto mockup
            camera.position.set(0, 9.5, 7.5);
            camera.lookAt(0, -0.5, 0.2);
        }

        function onPointerDown(event) {
            if (GameState.isLock) return;
            
            // Proteksi klik area HUD atas dan Dock tombol bawah agar tidak tembus raycast klik-nya
            if (event.clientY < 140 || event.clientY > (window.innerHeight - 130)) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cellsArray);

            if (intersects.length > 0) {
                const clickedCell = intersects[0].object;
                const cellIndex = clickedCell.userData.index;

                if (GameState.currentGrid[cellIndex] === null) {
                    executeMove(cellIndex, clickedCell.position);
                }
            }
        }

        function executeMove(index, pos) {
            GameState.currentGrid[index] = GameState.currentPlayer;
            
            const symbolMesh = create3DPiece(GameState.currentPlayer);
            symbolMesh.position.set(pos.x, 2.0, pos.z); 
            piecesGroup.add(symbolMesh);

            GameState.isLock = true; 

            // Efek animasi balok pion jatuh menancap di petak kayu
            gsap.to(symbolMesh.position, {
                y: 0.22,
                duration: 0.25,
                ease: "power2.out",
                onComplete: () => { checkWinCondition(index); }
            });
        }

        function create3DPiece(type) {
            const group = new THREE.Group();
            if (type === "X") {
                const matX = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.3, metalness: 0.5 });
                const armGeo = new THREE.BoxGeometry(0.12, 0.12, 0.5);
                const arm1 = new THREE.Mesh(armGeo, matX); arm1.rotation.y = Math.PI / 4;
                const arm2 = new THREE.Mesh(armGeo, matX); arm2.rotation.y = -Math.PI / 4;
                group.add(arm1, arm2);
            } else {
                const matO = new THREE.MeshStandardMaterial({ color: 0xcc6644, roughness: 0.3, metalness: 0.4 });
                const ring = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.05, 6, 16), matO);
                ring.rotation.x = Math.PI / 2;
                group.add(ring);
            }
            return group;
        }

        // --- ATURAN LOGIKA KEMENANGAN 5-IN-A-ROW (GOMOKU GRID) ---
        // Karena ukuran papan raksasa 100 petak, pemenang ditentukan dari siapa yang berhasil menyusun 5 beruntun
        function checkWinCondition(lastIdx) {
            const size = GameState.gridSize;
            const r = Math.floor(lastIdx / size);
            const c = lastIdx % size;
            const sym = GameState.currentGrid[lastIdx];

            const directions = [
                { dr: 0, dc: 1 },  // Horisontal
                { dr: 1, dc: 0 },  // Vertikal
                { dr: 1, dc: 1 },  // Diagonal Turun
                { dr: 1, dc: -1 }  // Diagonal Naik
            ];

            for (let d of directions) {
                let count = 1;

                // Cek arah positif forward
                let step = 1;
                while (true) {
                    let nr = r + d.dr * step;
                    let nc = c + d.dc * step;
                    if (nr >= 0 && nr < size && nc >= 0 && nc < size && GameState.currentGrid[nr * size + nc] === sym) {
                        count++;
                        step++;
                    } else { break; }
                }

                // Cek arah negatif backward
                step = 1;
                while (true) {
                    let nr = r - d.dr * step;
                    let nc = c - d.dc * step;
                    if (nr >= 0 && nr < size && nc >= 0 && nc < size && GameState.currentGrid[nr * size + nc] === sym) {
                        count++;
                        step++;
                    } else { break; }
                }

                if (count >= 5) {
                    announceWinner(sym);
                    return;
                }
            }

            // Cek Jika Papan Penuh (Seri)
            if (!GameState.currentGrid.includes(null)) {
                announceWinner("DRAW");
            } else {
                GameState.currentPlayer = GameState.currentPlayer === "X" ? "O" : "X";
                updateHUD();
                GameState.isLock = false;
            }
        }

        function announceWinner(winner) {
            const banner = document.getElementById('banner-overlay');
            if (winner === "DRAW") {
                document.getElementById('banner-text').innerText = "PERMAINAN SERI!";
            } else {
                GameState.players[winner].score += 1;
                document.getElementById('banner-text').innerText = `${GameState.players[winner].name.toUpperCase()} MENANG!`;
            }
            
            banner.classList.add('show');
            setTimeout(() => {
                banner.classList.remove('show');
                resetPapan();
            }, 3000);
        }

        // --- FUNGSIONAL PANEL CONTROL BAWAH ---
        function refreshTampilan() {
            gsap.to(boardGroup.rotation, {
                y: boardGroup.rotation.y + Math.PI * 2,
                duration: 0.8,
                ease: "power2.inOut"
            });
        }

        function resetPapan() {
            // Hapus semua bidion X / O di layar 3D
            while(piecesGroup.children.length > 0){
                piecesGroup.remove(piecesGroup.children[0]);
            }
            GameState.currentGrid.fill(null);
            GameState.currentPlayer = "X";
            updateHUD();
            GameState.isLock = false;
        }

        function selesaikanPermainan() {
            const scoreX = GameState.players.X.score;
            const scoreO = GameState.players.O.score;
            let msg = "SKOR SERI!";
            if (scoreX > scoreO) msg = `${GameState.players.X.name.toUpperCase()} JUARA!`;
            else if (scoreO > scoreX) msg = `${GameState.players.O.name.toUpperCase()} JUARA!`;

            alert(`Permainan Selesai!\nSkor Akhir:\n${GameState.players.X.name}: ${scoreX}\n${GameState.players.O.name}: ${scoreO}\n\n${msg}`);
            resetPapan();
            GameState.players.X.score = 0;
            GameState.players.O.score = 0;
            updateHUD();
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('menu-screen').style.opacity = 1;
        }

        // --- ANIMATION LOOP SYSTEM ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Efek perputaran rotasi kamera idle yang sangat tipis agar efek kedalaman 3D terasa nyata
            if (boardGroup && !GameState.isLock) {
                boardGroup.rotation.y = Math.sin(Date.now() * 0.0003) * 0.015;
            }

            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        function onWindowResize() {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                adjustCamera();
            }
        }
    </script>
</body>
</html>
